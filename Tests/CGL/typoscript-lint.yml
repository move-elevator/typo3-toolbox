paths:
  - ../../Configuration/
filePatterns:
  - "*.typoscript"
  - "*.tsconfig"
sniffs:
  - class: Indentation
    parameters:
      useSpaces: false
      indentPerLevel: 1
      indentConditions: true
  - class: NestingConsistency
    disabled: true
  - class: RepeatingRValue
    disabled: true
