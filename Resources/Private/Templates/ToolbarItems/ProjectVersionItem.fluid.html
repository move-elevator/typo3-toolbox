<f:asset.css identifier="project-version">
	.topbar-header-project-version {
		display: inline-block;
		padding: 13.5px;
	}
</f:asset.css>

<f:if condition="{version}">
	<div class="topbar-header-project-version" title="Project version">
		<core:icon identifier="actions-tag" size="small" /> {version}
	</div>
</f:if>
